<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Toshkent Aeroporti - Bojxona Qo'llanmasi</title>
    
    <!-- Tailwind CSS (Styling) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Custom Scrollbar Hide Styles -->
    <style>
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        body {
            -webkit-tap-highlight-color: transparent;
        }
    </style>

    <!-- Import Map for React, Framer Motion and Lucide Icons -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "framer-motion": "https://esm.sh/framer-motion@11.0.8?external=react,react-dom",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0?external=react"
        }
    }
    </script>
    
    <!-- Babel Compiler for Browser (to run JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#f8fafc] text-slate-900">
    
    <!-- React App Root -->
    <div id="root"></div>

    <!-- Main Application Logic -->
    <script type="text/babel" data-type="module">
        import React, { useState, useMemo, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion, AnimatePresence } from 'framer-motion';
        import { 
          Search, ShieldAlert, PlaneTakeoff, PlaneLanding, FileText, 
          ArrowUpRight, ArrowDownRight, DollarSign, Archive, 
          CheckCircle, Info, Scale, Clock, Users,
          Map, Fingerprint, CameraOff, Smartphone, Briefcase, Ban, ListChecks, 
          UserCheck, Gavel, Package, FileSignature, AlertOctagon, ChevronRight,
          Focus, Activity, Box, ChevronLeft, AlertTriangle
        } from 'lucide-react';

        // --- MODERN UI COMPONENTS ---

        const Card = ({ children, className = '' }) => (
          <div className={`bg-white rounded-[1.5rem] shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100/60 p-5 sm:p-7 transition-all duration-300 ${className}`}>
            {children}
          </div>
        );

        const LegalBasis = ({ children }) => (
          <div className="mt-6 flex items-start gap-3.5 bg-slate-50 p-4 sm:p-5 rounded-2xl border border-slate-200/60 relative overflow-hidden group">
            <div className="absolute top-0 left-0 w-1.5 h-full bg-slate-300 group-hover:bg-blue-500 transition-colors duration-300"></div>
            <div className="bg-white p-2 rounded-xl shadow-sm border border-slate-100 shrink-0">
              <Scale className="w-5 h-5 text-slate-600 group-hover:text-blue-600 transition-colors" />
            </div>
            <div className="pt-0.5">
              <span className="font-bold block mb-1 text-slate-800 text-[13px] uppercase tracking-wider">Huquqiy asosi</span>
              <span className="text-sm text-slate-600 leading-relaxed font-medium">{children}</span>
            </div>
          </div>
        );

        const LawBadge = ({ children }) => (
          <span className="inline-flex items-center gap-1.5 rounded-md bg-indigo-50/80 px-2.5 py-1 text-[11px] sm:text-xs font-black text-indigo-700 border border-indigo-200/50 mx-1 shadow-sm whitespace-nowrap my-0.5">
            <Scale className="w-3 h-3 text-indigo-500" />
            {children}
          </span>
        );

        const AlertDanger = ({ title, children, icon: Icon = ShieldAlert }) => (
          <div className="my-6 bg-red-50/80 border border-red-100 p-5 sm:p-6 rounded-3xl relative overflow-hidden">
            <div className="absolute -right-4 -top-4 opacity-[0.03]"><Icon className="w-32 h-32 text-red-900"/></div>
            <div className="flex items-center gap-3 mb-4 relative z-10">
              <div className="p-2 bg-red-100 rounded-xl">
                <Icon className="w-5 h-5 text-red-600" />
              </div>
              <h4 className="font-black text-red-900 text-lg uppercase tracking-wide">{title}</h4>
            </div>
            <div className="text-red-900 text-sm sm:text-base space-y-2 leading-relaxed relative z-10 font-medium">{children}</div>
          </div>
        );

        const HighlightText = ({ children }) => (
          <span className="bg-amber-100 text-amber-900 font-bold px-1.5 py-0.5 rounded mx-0.5">
            {children}
          </span>
        );

        const GradientHeader = ({ title, subtitle }) => (
          <div className="mb-6">
            <h2 className="text-2xl sm:text-3xl font-black text-slate-800 tracking-tight leading-tight">
              {title}
            </h2>
            {subtitle && <p className="text-slate-500 font-bold uppercase tracking-widest text-xs mt-2">{subtitle}</p>}
          </div>
        );

        // --- DETAILED CONTENT DATA LIST ---
        const sectionsData = [
          {
            id: 'asosiy',
            title: "Asosiy tushunchalar va nazorat",
            subtitle: "Hudud, chegara va nazorat shakllari",
            icon: <Map className="w-6 h-6" />,
            color: "from-teal-400 to-emerald-500",
            bg: "bg-teal-50 text-teal-600",
            searchKeywords: "hudud chegara zona nazorat o'tkazish og'zaki so'rov ko'zdan kechirish ko'rik jarima mjtK 227",
            content: () => (
              <div className="space-y-6">
                <GradientHeader title="Bojxona nazoratini amalga oshirish shakllari" subtitle="Hujjat bo'yicha aniq ta'riflar"/>
                
                <div className="space-y-4">
                  <Card>
                    <h3 className="font-black text-slate-800 mb-3 flex items-center gap-3 text-lg">
                      <div className="p-2.5 bg-emerald-50 rounded-[10px] text-emerald-600"><Map className="w-5 h-5"/></div> 
                      Bojxona hududi
                    </h3>
                    <p className="text-[15px] text-slate-700 leading-relaxed font-medium">O'zbekiston Respublikasining <HighlightText>quruqlikdagi hududi</HighlightText>, <HighlightText>hududiy va ichki suvlari</HighlightText> hamda ular ustidagi <HighlightText>havo hududi</HighlightText>.</p>
                  </Card>
                  
                  <Card>
                    <h3 className="font-black text-slate-800 mb-3 flex items-center gap-3 text-lg">
                      <div className="p-2.5 bg-blue-50 rounded-[10px] text-blue-600"><Focus className="w-5 h-5"/></div> 
                      Bojxona chegarasi
                    </h3>
                    <p className="text-[15px] text-slate-700 leading-relaxed font-medium">Bojxona hududi sarhadlari, shuningdek <HighlightText>erkin bojxona zonalarining</HighlightText> va <HighlightText>erkin omborlarning</HighlightText> tegralari.</p>
                  </Card>
                  
                  <Card className="border-l-4 border-l-indigo-500">
                    <h3 className="font-black text-slate-800 mb-3 flex items-center gap-3 text-lg">
                      <div className="p-2.5 bg-indigo-50 rounded-[10px] text-indigo-600"><ShieldAlert className="w-5 h-5"/></div> 
                      Bojxona nazorati zonasi
                    </h3>
                    <p className="text-[15px] text-slate-700 leading-relaxed font-medium mb-3">Bojxona hududining bojxona to'g'risidagi qonunchilikka rioya etilishini ta'minlash maqsadida tashkil qilinadigan, <HighlightText>maxsus ajratib va belgilab qo'yilgan qismi</HighlightText>.</p>
                    <p className="text-sm text-slate-600 leading-relaxed font-medium border-t border-slate-100 pt-3">
                      Bojxona nazorati zonasi rejimiga rioya etilishini nazorat qilish bojxona organining mansabdor shaxsi tomonidan amalga oshiriladi <LawBadge>BK 182-moddasi</LawBadge>.
                    </p>
                  </Card>
                </div>

                <AlertDanger title="Qat'iy Ogohlantirish va Jarimalar">
                  Bojxona organining <strong>ruxsatisiz</strong> bojxona nazorati zonasi chegarasi orqali va uning doirasida tovarlar, transport vositalari va shaxslarni olib o'tish yoki bojxona nazorati zonasi rejimini buzuvchi boshqa xatti-harakatlar sodir etish qat'iyan taqiqlanadi.
                  <div className="mt-4 bg-white p-4 rounded-xl border border-red-100 text-red-900 shadow-sm">
                     <p className="font-bold mb-2 flex items-center gap-2"><Gavel className="w-4 h-4"/> Jarima miqdorlari <LawBadge>MJtK 227-moddasi</LawBadge>:</p>
                     <ul className="list-disc pl-5 space-y-1">
                       <li>Fuqarolarga: BHMning <HighlightText>1 baravaridan 3 baravarigacha</HighlightText>.</li>
                       <li>Mansabdor shaxslarga: BHMning <HighlightText>3 baravaridan 5 baravarigacha</HighlightText>.</li>
                     </ul>
                  </div>
                </AlertDanger>

                <Card className="border-t-[6px] border-t-blue-500 bg-gradient-to-b from-blue-50/30 to-white">
                  <h3 className="text-xl font-black text-slate-800 mb-2 flex items-center gap-3">
                    <ListChecks className="w-7 h-7 text-blue-500" />
                    Nazorat shakllari va qoidalari
                  </h3>
                  <p className="text-sm text-slate-600 mb-6 font-medium leading-relaxed bg-blue-50 p-4 rounded-xl border border-blue-100">
                    Bojxona organlari bojxona nazorati shakllarini qo'llashda <HighlightText>tanlab olish prinsipiga</HighlightText> asoslanadi va bojxona nazoratining bojxona to'g'risidagi qonunchiligiga rioya etilishini ta'minlaydigan shakllari bilan cheklanadi. Shaklni tanlash xodim tomonidan belgilanadi <LawBadge>BK 189-moddasi</LawBadge>.
                  </p>
                  
                  <div className="space-y-4">
                    <div className="p-5 rounded-2xl bg-white border border-slate-200 shadow-sm">
                      <h4 className="font-black text-slate-800 text-lg mb-2 flex items-center gap-3"><div className="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-sm">1</div> Og'zaki so'rov</h4>
                      <p className="text-[15px] text-slate-600 font-medium leading-relaxed pl-11">Zarur axborotni og'zaki shaklda, bunday so'rov natijalarini yozma shaklda rasmiylashtirmagan holda olish <LawBadge>BK 191-modda</LawBadge>.</p>
                    </div>
                    
                    <div className="p-5 rounded-2xl bg-white border border-slate-200 shadow-sm">
                      <h4 className="font-black text-slate-800 text-lg mb-2 flex items-center gap-3"><div className="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-sm">2</div> Bojxona ko'zdan kechiruvi</h4>
                      <p className="text-[15px] text-slate-600 font-medium leading-relaxed pl-11">Obyektlarni va ularning qismlarini bo'laklarga <HighlightText>ajratmagan</HighlightText> va boshqa yo'llar bilan ularning butligini buzmagan holda tashqi ko'rinishini ko'zdan kechirish <LawBadge>BK 193-modda</LawBadge>.</p>
                    </div>
                    
                    <div className="p-5 rounded-2xl bg-white border border-slate-200 shadow-sm">
                      <h4 className="font-black text-slate-800 text-lg mb-2 flex items-center gap-3"><div className="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-sm">3</div> Bojxona ko'rigi</h4>
                      <p className="text-[15px] text-slate-600 font-medium leading-relaxed pl-11">Qo'yilgan bojxona identifikatsiyalashi vositalarini <HighlightText>buzgan xolda</HighlightText>, tovarlar bo'lgan yoki bo'lishi ehtimoli bo'lgan joylarni ochishni nazarda tutadi <LawBadge>BK 195-modda</LawBadge>.</p>
                    </div>
                  </div>
                </Card>
              </div>
            )
          },
          {
            id: 'shaxsiy-korik',
            title: "Shaxsiy ko'rik",
            subtitle: "O'tkazish tartibi va soddalashtirilgan shakli batafsil",
            icon: <Fingerprint className="w-6 h-6" />,
            color: "from-indigo-500 to-purple-600",
            bg: "bg-indigo-50 text-indigo-600",
            searchKeywords: "shaxsiy ko'rik soddalashtirilgan qaror xolis bayonnoma skaner",
            content: () => (
              <div className="space-y-6">
                <GradientHeader title="Shaxsiy ko'rik jarayoni" subtitle="Hujjatdagi to'liq ko'rsatmalar"/>
                
                <Card className="border-t-[6px] border-t-indigo-500 bg-slate-900 text-white p-6 sm:p-8">
                  <p className="text-[15px] text-slate-200 mb-6 leading-relaxed font-medium">
                    <strong className="text-white block mb-2 text-lg border-b border-slate-700 pb-2">Qachon o'tkaziladi? (Asoslar)</strong> 
                    Bojxona hududiga olib kirish yoki ushbu hududdan olib chiqish taqiqlangan tovarlarni jismoniy shaxs <HighlightText>yonida yashirmoqda</HighlightText> va ularni o'z ixtiyori bilan <HighlightText>taqdim etmoqchi emas</HighlightText>, deb taxmin qilishga asoslar bo'lgan taqdirda. (Shuningdek, Xavfni boshqarish tizimi topshirig'i yoki masofaviy nazorat natijasi asosida).
                  </p>
                  <div className="bg-white/10 p-5 rounded-2xl border border-white/20 backdrop-blur-md">
                    <h4 className="font-black text-indigo-300 mb-4 flex items-center gap-3 text-lg">
                      <UserCheck className="w-6 h-6"/> Ko'rikdan avvalgi harakatlar:
                    </h4>
                    <ul className="space-y-4">
                      <li className="flex items-start gap-3 text-[15px] font-medium"><CheckCircle className="w-5 h-5 text-emerald-400 shrink-0"/> <div>Ko'rik o'tkazish haqidagi <strong>qaror bojxona organi boshlig'i</strong> yoki uning o'rinbosari tomonidan qabul qilinishi.</div></li>
                      <li className="flex items-start gap-3 text-[15px] font-medium"><CheckCircle className="w-5 h-5 text-emerald-400 shrink-0"/> <div>Qarorni jismoniy shaxsga e'lon qilish.</div></li>
                      <li className="flex items-start gap-3 text-[15px] font-medium"><CheckCircle className="w-5 h-5 text-emerald-400 shrink-0"/> <div>Shaxsni uning huquqlari bilan tanishtirish.</div></li>
                      <li className="flex items-start gap-3 text-[15px] font-medium"><CheckCircle className="w-5 h-5 text-emerald-400 shrink-0"/> <div>Tovarlarni o'z <strong>ixtiyori bilan berishni taklif qilish shart</strong>.</div></li>
                    </ul>
                  </div>
                  <div className="mt-6 bg-red-500/20 border border-red-500/50 p-4 rounded-xl flex gap-3">
                     <AlertOctagon className="w-6 h-6 text-red-400 shrink-0"/>
                     <p className="text-sm font-bold text-red-200">Agar shaxs qonuniy talablarni bajarmasa yoki qarshilik ko'rsatsa, bu uni <strong>ma'muriy yo'l bilan ushlab turish</strong> uchun asos bo'ladi.</p>
                  </div>
                </Card>

                <Card>
                  <h3 className="text-xl font-black text-slate-800 mb-5 flex items-center gap-3"><Gavel className="w-6 h-6 text-slate-500"/> O'tkazish qoidalari <LawBadge>BK 196-moddasi</LawBadge></h3>
                  <div className="space-y-3">
                    <div className="p-4 bg-slate-50 rounded-xl border border-slate-100 flex gap-3"><div className="w-2 h-2 rounded-full bg-indigo-500 mt-2 shrink-0"/> <p className="text-[15px] text-slate-700 font-medium"><HighlightText>Alohida</HighlightText>, sanitariya-gigiyena talablariga javob beradigan xonada o'tkaziladi.</p></div>
                    <div className="p-4 bg-slate-50 rounded-xl border border-slate-100 flex gap-3"><div className="w-2 h-2 rounded-full bg-indigo-500 mt-2 shrink-0"/> <p className="text-[15px] text-slate-700 font-medium">Boshqa shaxslar kuzatishini mutlaqo <HighlightText>istisno etgan holda</HighlightText>.</p></div>
                    <div className="p-4 bg-slate-50 rounded-xl border border-slate-100 flex gap-3"><div className="w-2 h-2 rounded-full bg-indigo-500 mt-2 shrink-0"/> <p className="text-[15px] text-slate-700 font-medium">Ko'rikdan o'tkazilayotgan shaxs bilan <HighlightText>bir jinsdagi xodim</HighlightText> tomonidan o'tkaziladi.</p></div>
                    <div className="p-4 bg-slate-50 rounded-xl border border-slate-100 flex gap-3"><div className="w-2 h-2 rounded-full bg-indigo-500 mt-2 shrink-0"/> <p className="text-[15px] text-slate-700 font-medium">Aynan shu jinsdagi <HighlightText>ikki xolis</HighlightText> ishtirokida.</p></div>
                    <div className="p-4 bg-slate-50 rounded-xl border border-slate-100 flex gap-3"><div className="w-2 h-2 rounded-full bg-indigo-500 mt-2 shrink-0"/> <p className="text-[15px] text-slate-700 font-medium">Tana faqat tibbiyot xodimlari tomonidan tekshiriladi.</p></div>
                    <div className="p-4 bg-slate-50 rounded-xl border border-slate-100 flex gap-3"><div className="w-2 h-2 rounded-full bg-indigo-500 mt-2 shrink-0"/> <p className="text-[15px] text-slate-700 font-medium">Zarur bo'lganda tarjimon jalb qilinadi.</p></div>
                    <div className="p-4 bg-slate-50 rounded-xl border border-slate-100 flex gap-3"><div className="w-2 h-2 rounded-full bg-indigo-500 mt-2 shrink-0"/> <p className="text-[15px] text-slate-700 font-medium">Voyaga yetmagan yoki muomalaga layoqatsiz shaxs ko'rigida qonuniy vakillari hozir bo'lishiga haqli.</p></div>
                    <div className="p-4 bg-blue-50 rounded-xl border border-blue-200 flex gap-3"><FileSignature className="w-5 h-5 text-blue-600 shrink-0 mt-0.5"/> <p className="text-[15px] text-blue-900 font-bold">Natijalar bo'yicha belgilangan shaklda bayonnoma tuziladi.</p></div>
                  </div>
                </Card>

                <div className="bg-gradient-to-br from-indigo-600 to-purple-800 rounded-[2rem] p-6 sm:p-8 text-white shadow-2xl relative overflow-hidden">
                  <div className="absolute -right-10 -bottom-10 opacity-10"><Fingerprint className="w-64 h-64"/></div>
                  <h3 className="text-2xl font-black mb-6 flex items-center gap-3 relative z-10"><Focus className="w-8 h-8 text-indigo-300"/> Soddalashtirilgan shakli</h3>
                  <p className="text-indigo-100 mb-5 relative z-10 text-[15px] font-medium leading-relaxed">Vaqtni tejash va qulaylik maqsadida, quyidagi usullar orqali soddalashtirilgan ko'rik amalga oshirilishi mumkin:</p>
                  <ul className="space-y-4 text-blue-50 mb-6 relative z-10 font-medium">
                    <li className="flex items-center gap-4 bg-white/10 p-5 rounded-2xl border border-white/10"><CheckCircle className="w-6 h-6 text-emerald-400 shrink-0"/> <span className="text-[16px]">Inson tanasini skaner qiluvchi qurilmalarni qo'llash orqali.</span></li>
                    <li className="flex items-center gap-4 bg-white/10 p-5 rounded-2xl border border-white/10"><CheckCircle className="w-6 h-6 text-emerald-400 shrink-0"/> <span className="text-[16px]">Ust kiyim boshlarini yechintirmagan holda, ust kiyim va tanani paypaslab tekshirish orqali.</span></li>
                  </ul>
                  <div className="bg-white text-indigo-900 p-5 sm:p-6 rounded-2xl shadow-lg leading-relaxed text-base font-bold relative z-10 text-center border-[3px] border-indigo-200">
                    <p className="text-lg mb-2 uppercase tracking-wide">Qaror va bayonnoma talab etilmaydi!</p>
                    <p className="font-medium text-slate-600 text-sm">Bojxona organlari tomonidan soddalashtirilgan tarzda o'tkazilganda yuqoridagilar talab etilmaydi. Agar qonun buzilishi aniqlansa, to'liq ko'rikka o'tiladi va bayonnoma tuziladi.</p>
                  </div>
                  <div className="mt-6 text-sm text-indigo-200 font-bold flex items-center justify-center gap-2 opacity-90 relative z-10 bg-black/20 p-3 rounded-xl backdrop-blur-sm w-max mx-auto">
                    <Scale className="w-4 h-4"/> Vazirlar Mahkamasining 2025-yil 6-noyabrdagi 700-son qarori
                  </div>
                </div>
              </div>
            )
          },
          {
            id: 'aeroport-nazorat',
            title: "Aeroportda nazorat",
            subtitle: "Xalqaro aeroportdagi barcha tartib-taomillar",
            icon: <PlaneTakeoff className="w-6 h-6" />,
            color: "from-sky-500 to-blue-600",
            bg: "bg-sky-50 text-sky-600",
            searchKeywords: "aeroport masofaviy qizil yashil yo'lak suratga olish DXX aviatsiya xavfsizligi",
            content: () => (
              <div className="space-y-6">
                <GradientHeader title="Xalqaro aeroportda nazorat" subtitle="Umumiy qoidalar va Yo'laklar"/>
                
                <Card className="p-0 overflow-hidden shadow-md">
                  <div className="p-6 bg-slate-900 text-white">
                    <h3 className="text-xl font-black flex items-center gap-3 mb-4"><Briefcase className="w-6 h-6 text-blue-400"/> Umumiy qoidalar <LawBadge>VM 912-son</LawBadge></h3>
                    <p className="text-[15px] leading-relaxed font-medium bg-white/10 p-5 rounded-2xl border border-white/20 backdrop-blur-sm">
                      Davlat chegarasi orqali o'tadigan barcha shaxslar, transport vositalari va tovarlar <HighlightText>chegara, bojxona, sanitariya-karantin, fitosanitariya va veterinariya</HighlightText> nazoratidan o'tkaziladi. Nazorat tartib-taomillari davlat nazorati organlarining o'zaro hamkorligida amalga oshiriladi.
                    </p>
                  </div>
                  
                  <div className="bg-red-50 border-t-4 border-red-500 p-6 sm:p-8 relative">
                    <div className="absolute right-0 bottom-0 opacity-5"><CameraOff className="w-40 h-40"/></div>
                    <h4 className="font-black text-red-900 mb-5 flex items-center gap-3 text-lg relative z-10"><Ban className="w-6 h-6 text-red-600"/> O'tkazish punktida taqiqlanadi:</h4>
                    <ul className="space-y-4 relative z-10">
                      <li className="flex items-center gap-4 bg-white p-4 rounded-xl shadow-sm border border-red-100">
                        <div className="bg-red-100 p-2 rounded-lg shrink-0"><CameraOff className="w-6 h-6 text-red-600"/></div>
                        <span className="text-[15px] font-bold text-red-900">Chegara nazorati rahbari va(yoki) bojxona boshlig'i ruxsatisiz foto va videoga suratga olish.</span>
                      </li>
                      <li className="flex items-center gap-4 bg-white p-4 rounded-xl shadow-sm border border-red-100">
                        <div className="bg-red-100 p-2 rounded-lg shrink-0"><Smartphone className="w-6 h-6 text-red-600"/></div>
                        <span className="text-[15px] font-bold text-red-900">Nazorat tartib-taomillari tashkil etilishiga xalaqit bersa, mobil va boshqa vositalardan foydalanish.</span>
                      </li>
                    </ul>
                  </div>
                </Card>

                <h3 className="text-2xl font-black text-slate-800 mt-10 mb-5">Ikki yo'lakli nazorat</h3>
                
                <div className="grid grid-cols-1 gap-5">
                  <div className="bg-emerald-50 rounded-[2rem] p-6 sm:p-8 border border-emerald-200 shadow-md relative overflow-hidden">
                    <div className="absolute -right-6 -bottom-6 opacity-10"><PlaneLanding className="w-48 h-48 text-emerald-800"/></div>
                    <h4 className="font-black text-emerald-800 text-2xl mb-4 flex items-center gap-3 relative z-10">
                      <span className="w-4 h-4 rounded-full bg-emerald-500 shadow-[0_0_15px_rgba(16,185,129,0.8)] animate-pulse"></span> Yashil yo'lak

                        desc: "Shaxsni ushlab turish bayonnomasi tuziladi.",
                        law: "MJtK 285-288-moddalari",
                        extra: "Shaxsni 3 soat ushlab turish mumkin (aniqlangan vaqtdan boshlanadi).",
                        icon: <Clock className="w-6 h-6"/>
                      },
                      { 
                        s: "2.3", 
                        title: "Tovarlarni ko'zdan kechirish va bayonnoma", 
                        desc: "Tovarlarni xolislar ishtirokida ko'zdan kechirish va bayonnoma tuzish. Huquqbuzar ma'lumotlari, tovar tasnifi yoziladi.",
                        law: "JPK 135-137, 139-141-moddalari",
                        alert: "Albatta fotosuratlar ilova qilinishi SHART!",
                        icon: <CameraOff className="w-6 h-6"/>
                      },
                      { 
                        s: "2.4", 
                        title: "Huquqbuzarlik to'g'risida bayonnoma", 
                        desc: "Aniqlangan huquqbuzarlik to'g'risidagi bayonnoma rasmiylashtiriladi.",
                        law: "MJtK 279-281-moddalari",
                        icon: <FileSignature className="w-6 h-6"/>
                      },
                      { 
                        s: "2.5", 
                        title: "Tushuntirish xatlari", 
                        desc: "Huquqbuzar va xolislarning tushuntirish xatlarini olish. Xatda shaxsga doir ma'lumotlar va ko'rsatmalar yoziladi.",
                        extra: "Agar fuqaroga olib kirish me'yoridagi tovarlari qayтариб берилса, bu haqida tushuntirish xatida va alohida ro'yxat tuzib (nomi/soni) kiritilishi lozim. Huquqbuzar o'z ko'rsatmalarini qo'lyozma tarzida berish istagini bildirsa ruxsat berish kerak. Turli bosqichlarda bir necha xolis ishtirok etsa ulardan ham xat olinadi.",
                        icon: <FileText className="w-6 h-6"/>
                      },
                      { 
                        s: "2.6", 
                        title: "Tilxat olish", 
                        desc: "Huquqbuzardan huquqlari bilan tanishtirilganligi to'g'risida tilxat olinadi.",
                        law: "MJtK 294-moddasi",
                        extra: "Shu bilan birga agar tadbirkorlik subyekti bo'lsa va 1-marta sodir etayotgan bo'lsa, bojxona rasmiylashtiruvi amalga oshirilishi mumkinligi haqida tilxat (MJtK 271-modda 11-bandi).",
                        icon: <Fingerprint className="w-6 h-6"/>
                      },
                      { 
                        s: "2.7", 
                        title: "Saqlov", 
                        desc: "Tovarlar saqlovini ta'minlash.",
                        law: "VM 200-son qarori",
                        icon: <Archive className="w-6 h-6"/>
                      }
                    ].map((step, i) => (
                      <motion.div variants={itemVariants} key={i} className="relative pl-14 sm:pl-20 group">
                        <div className="absolute -left-1 sm:-left-1 top-0 bg-white border-4 border-slate-200 text-slate-500 w-12 h-12 sm:w-14 sm:h-14 rounded-full flex justify-center items-center font-black shadow-md text-sm sm:text-base group-hover:border-blue-500 group-hover:text-blue-600 group-hover:scale-110 transition-all duration-300 z-10">
                          {step.s}
                        </div>
                        <div className="bg-white p-5 sm:p-6 rounded-[2rem] shadow-sm border border-slate-100 group-hover:shadow-lg group-hover:border-blue-200 transition-all duration-300">
                          <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-3 border-b border-slate-100 pb-3">
                            <h4 className="font-black text-slate-800 text-lg flex items-center gap-3">
                              <div className="text-slate-400 group-hover:text-blue-500 transition-colors">{step.icon}</div>
                              {step.title}
                            </h4>
                            {step.law && <LawBadge>{step.law}</LawBadge>}
                          </div>
                          <p className="text-[15px] text-slate-700 font-medium leading-relaxed">{step.desc}</p>
                          
                          {step.alert && (
                            <div className="mt-4 p-3 bg-amber-50 text-amber-900 text-sm font-black uppercase tracking-wide rounded-xl border border-amber-200 inline-block shadow-sm">
                              {step.alert}
                            </div>
                          )}

                          {step.extra && (
                            <div className="mt-4 bg-slate-50 p-4 rounded-xl text-[14px] text-slate-700 font-medium border border-slate-200 leading-relaxed shadow-inner">
                              <span className="font-black text-indigo-700 uppercase text-[10px] tracking-widest block mb-1">Muhim detal</span>
                              {step.extra}
                            </div>
                          )}
                        </div>
                      </motion.div>
                    ))}

                    {/* Step 8 Highlighted Extravaganza */}
                    <motion.div variants={itemVariants} className="relative pl-14 sm:pl-20 mt-12">
                      <div className="absolute -left-2 sm:-left-2 top-6 bg-indigo-600 text-white w-14 h-14 sm:w-16 sm:h-16 rounded-full flex justify-center items-center font-black shadow-[0_0_20px_rgba(79,70,229,0.8)] ring-4 ring-white animate-pulse z-10 text-lg">
                        2.8
                      </div>
                      <div className="bg-gradient-to-br from-indigo-600 via-purple-700 to-indigo-900 p-6 sm:p-8 rounded-[2.5rem] shadow-2xl text-white relative overflow-hidden border-[4px] border-indigo-400/50">
                        <div className="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-10"></div>
                        <div className="absolute -right-10 -bottom-10 opacity-20"><Activity className="w-48 h-48"/></div>
                        
                        <h4 className="font-black text-2xl sm:text-3xl mb-4 flex items-center gap-3 relative z-10">
                          <div className="bg-white/20 p-3 rounded-2xl backdrop-blur-md shadow-inner"><Activity className="w-8 h-8 text-white"/></div> 
                          YaAAT bazasiga kiritish
                        </h4>
                        
                        <div className="bg-black/30 p-5 rounded-2xl backdrop-blur-sm border border-white/20 relative z-10 shadow-inner">
                          <p className="text-white text-[15px] sm:text-[16px] font-medium leading-relaxed">
                            "Bojxona qonunbuzarliklari" yagona avtomatlashtirilgan axborot tizimiga holat aniqlangan vaqtdan boshlab <strong className="bg-white text-indigo-900 px-3 py-1.5 rounded-lg shadow-lg mx-1 font-black uppercase tracking-wider text-sm sm:text-base inline-block my-1 animate-bounce">24 soat ichida</strong> bexato kiritilishi qat'iyan talab etiladi!
                          </p>
                        </div>
                      </div>
                    </motion.div>

                  </div>
                </div>
              </div>
            )
          }
        ];

        export default function App() {
          const [activeTab, setActiveTab] = useState(null); 
          const [searchQuery, setSearchQuery] = useState('');
          
          const scrollRef = useRef(null);

          const filteredSections = useMemo(() => {
            if (!searchQuery.trim()) return sectionsData;
            const query = searchQuery.toLowerCase();
            return sectionsData.filter(section => 
              section.title.toLowerCase().includes(query) || 
              section.searchKeywords.toLowerCase().includes(query) ||
              section.subtitle.toLowerCase().includes(query)
            );
          }, [searchQuery]);

          const activeSectionIndex = useMemo(() => {
            return sectionsData.findIndex(s => s.id === activeTab);
          }, [activeTab]);

          const activeSection = activeSectionIndex !== -1 ? sectionsData[activeSectionIndex] : null;

          return (
            <div className="h-screen w-full bg-[#f8fafc] font-sans selection:bg-blue-200 selection:text-blue-900 flex flex-col overflow-hidden relative">
              
              <AnimatePresence mode="wait">
                
                {/* 1. ASOSIY OYNA (MENYU) */}
                {!activeTab && (
                  <motion.div 
                    key="home"
                    initial={{ opacity: 0 }}
                    animate={{ opacity: 1 }}
                    exit={{ opacity: 0, scale: 0.95, filter: "blur(5px)" }}
                    transition={{ duration: 0.3 }}
                    className="flex-1 flex flex-col h-full z-10 relative overflow-hidden"
                  >
                    {/* Background design elements */}
                    <div className="absolute -top-40 -left-40 w-96 h-96 bg-blue-500/10 rounded-full blur-3xl pointer-events-none"></div>
                    <div className="absolute top-40 -right-20 w-72 h-72 bg-emerald-500/10 rounded-full blur-3xl pointer-events-none"></div>

                    {/* Header / Hero */}
                    <div className="bg-gradient-to-br from-slate-900 via-[#0f172a] to-blue-950 pt-14 pb-8 px-6 rounded-b-[2.5rem] shadow-xl relative z-10 overflow-hidden">
                      <div className="absolute top-0 right-0 w-64 h-64 bg-blue-500/20 rounded-full blur-3xl -translate-y-1/2 translate-x-1/3"></div>
                      <div className="absolute bottom-0 left-0 w-48 h-48 bg-indigo-500/20 rounded-full blur-3xl translate-y-1/3 -translate-x-1/4"></div>
                      
                      <div className="flex items-center gap-4 mb-8 relative z-10">
                        <div className="w-16 h-16 bg-white/10 backdrop-blur-xl border border-white/20 rounded-[1.2rem] flex items-center justify-center shadow-lg">
                          <PlaneTakeoff className="w-8 h-8 text-blue-300" />
                        </div>
                        <div>
                          <h1 className="text-white font-black text-2xl tracking-tight leading-none mb-1">Toshkent Aeroporti</h1>
                          <p className="text-blue-200/80 text-sm font-medium tracking-wide">Bojxona xodimi qo'llanmasi</p>
                        </div>
                      </div>

                      <div className="relative group z-10">
                        <Search className="w-5 h-5 absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-blue-400 transition-colors" />
                        <input 
                          type="text" 
                          placeholder="Mavzu yoki qoidani izlang..." 
                          value={searchQuery}
                          onChange={(e) => setSearchQuery(e.target.value)}
                          className="w-full pl-14 pr-5 py-4 bg-white/10 backdrop-blur-xl border border-white/20 focus:bg-white focus:border-blue-400 focus:ring-4 focus:ring-blue-500/30 rounded-2xl text-[15px] transition-all font-medium text-white placeholder-slate-400 focus:text-slate-800 shadow-inner outline-none"
                        />
                      </div>
                    </div>

                    <div className="flex-1 overflow-y-auto px-4 sm:px-6 py-8 pb-24 scrollbar-hide relative z-10">
                      <h2 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-5 px-1">Qo'llanma bo'limlari</h2>
                      
                      {filteredSections.length === 0 && (
                        <div className="text-center py-16">
                          <div className="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4">
                            <Search className="w-8 h-8 text-slate-400"/>
                          </div>
                          <p className="text-slate-500 font-bold">Hech narsa topilmadi</p>
                          <p className="text-slate-400 text-sm mt-1">Boshqa so'z bilan izlab ko'ring</p>
                        </div>
                      )}

                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 max-w-4xl mx-auto">
                        {filteredSections.map((section, index) => (
                          <button
                            key={section.id}
                            onClick={() => setActiveTab(section.id)}
                            className="w-full bg-white p-4 sm:p-5 rounded-3xl border border-slate-100 shadow-[0_2px_15px_-3px_rgba(0,0,0,0.03)] flex items-center gap-4 text-left hover:shadow-[0_8px_25px_-4px_rgba(0,0,0,0.08)] hover:-translate-y-1 transition-all duration-300 group relative overflow-hidden"
                          >
                            <div className={`absolute top-0 right-0 w-24 h-24 bg-gradient-to-bl ${section.color} opacity-5 group-hover:opacity-10 rounded-bl-full transition-opacity duration-300`}></div>
                            <div className={`w-14 h-14 rounded-2xl flex items-center justify-center shrink-0 bg-gradient-to-br ${section.color} shadow-inner relative z-10`}>
                              <div className="text-white drop-shadow-sm">{section.icon}</div>
                            </div>
                            <div className="flex-1 min-w-0 pt-1 relative z-10">
                              <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5 block">Modul {index + 1}</span>
                              <h3 className="font-black text-slate-800 text-[15px] sm:text-base leading-tight mb-1.5 truncate">{section.title}</h3>
                              <p className="text-[12px] sm:text-[13px] text-slate-500 font-medium line-clamp-2">{section.subtitle}</p>
                            </div>
                            <div className="hidden sm:flex w-10 h-10 rounded-full bg-slate-50 items-center justify-center group-hover:bg-blue-50 transition-colors shrink-0 relative z-10 border border-slate-100 group-hover:border-blue-100">
                              <ChevronRight className="w-5 h-5 text-slate-400 group-hover:text-blue-500" />
                            </div>
                          </button>
                        ))}
                      </div>
                      
                      {/* FOOTER SECTION */}
                      <div className="mt-12 text-center pb-4 opacity-70 hover:opacity-100 transition-opacity">
                        <p className="text-sm font-bold text-slate-500 tracking-wide">Toshkent-AERO IBK</p>
                        <p className="text-xs font-medium text-blue-500 mt-1 inline-block">by SHAKHOBIDDIN NORMAMATOV</p>
                      </div>
                    </div>
                  </motion.div>
                )}

                {/* 2. ICHKI SAHIFA (MAVZU MATNI) */}
                {activeTab && activeSection && (
                  <motion.div 
                    key="details"
                    initial={{ opacity: 0, x: '100%' }}
                    animate={{ opacity: 1, x: 0 }}
                    exit={{ opacity: 0, x: '-100%', filter: 'blur(5px)' }}
                    transition={{ type: "spring", stiffness: 300, damping: 30 }}
                    className="absolute inset-0 z-20 flex flex-col h-full bg-[#f8fafc] overflow-hidden"
                  >
                    
                    <header className="bg-white/90 backdrop-blur-xl border-b border-slate-200/80 px-4 sm:px-6 py-4 flex items-center justify-between sticky top-0 z-50 shadow-sm">
                      <button 
                        onClick={() => setActiveTab(null)}
                        className="p-2 sm:p-2.5 -ml-2 rounded-xl bg-slate-50 border border-slate-200 hover:bg-slate-100 hover:shadow-sm active:scale-95 transition-all text-slate-700 flex items-center gap-1 group"
                      >
                        <ChevronLeft className="w-5 h-5 group-hover:-translate-x-0.5 transition-transform" />
                        <span className="text-xs font-black uppercase tracking-wider pr-1 hidden sm:block">Orqaga</span>
                      </button>
                      <div className="flex-1 text-center sm:text-right px-4 overflow-hidden">
                        <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-0.5">O'quv Moduli</span>
                        <h2 className="font-black text-slate-800 text-[14px] sm:text-base truncate">{activeSection.title}</h2>
                      </div>
                      <div className={`w-10 h-10 rounded-[12px] flex items-center justify-center shrink-0 shadow-inner bg-gradient-to-br ${activeSection.color}`}>
                        {React.cloneElement(activeSection.icon, { className: "w-5 h-5 text-white" })}
                      </div>
                    </header>

                    <div ref={scrollRef} className="flex-1 overflow-y-auto px-4 sm:px-8 py-6 sm:py-10 bg-[#f8fafc] flex flex-col scroll-smooth relative">
                      {/* Fade overlay for scrolling */}
                      <div className="absolute top-0 left-0 w-full h-8 bg-gradient-to-b from-[#f8fafc] to-transparent z-10 pointer-events-none"></div>

                      <div className="max-w-2xl mx-auto w-full flex-1 relative z-0">
                        {activeSection.content()}
                        
                        {/* NEXT / PREV NAVIGATION */}
                        <div className="mt-16 mb-28 pt-10 border-t-2 border-slate-200 border-dashed flex flex-col sm:flex-row gap-4 justify-between relative">
                          {activeSectionIndex > 0 ? (
                            <button 
                              onClick={() => {
                                setActiveTab(sectionsData[activeSectionIndex - 1].id);
                                scrollRef.current?.scrollTo({ top: 0, behavior: 'smooth' });
                              }}
                              className="flex-1 flex items-center gap-4 p-5 rounded-3xl bg-white border border-slate-200 shadow-[0_4px_20px_rgb(0,0,0,0.03)] hover:shadow-lg hover:border-slate-300 hover:-translate-y-1 transition-all text-left group"
                            >
                              <div className="w-12 h-12 rounded-2xl bg-slate-50 border border-slate-200 flex items-center justify-center text-slate-500 shrink-0 group-hover:bg-slate-100 group-hover:text-slate-800 transition-colors"><ChevronLeft className="w-6 h-6"/></div>
                              <div className="min-w-0">
                                <span className="text-[10px] sm:text-xs text-slate-400 font-black uppercase tracking-widest block mb-1">Oldingi mavzu</span>
                                <span className="font-bold text-slate-800 text-sm sm:text-[15px] truncate block">{sectionsData[activeSectionIndex - 1].title}</span>
                              </div>
                            </button>
                          ) : <div className="flex-1 hidden sm:block"></div>}

                          {activeSectionIndex < sectionsData.length - 1 ? (
                            <button 
                              onClick={() => {
                                setActiveTab(sectionsData[activeSectionIndex + 1].id);
                                scrollRef.current?.scrollTo({ top: 0, behavior: 'smooth' });
                              }}
                              className="flex-1 flex items-center justify-end gap-4 p-5 rounded-3xl bg-white border border-slate-200 shadow-[0_4px_20px_rgb(0,0,0,0.03)] hover:shadow-lg hover:border-slate-300 hover:-translate-y-1 transition-all text-right group"
                            >
                              <div className="min-w-0">
                                <span className="text-[10px] sm:text-xs text-slate-400 font-black uppercase tracking-widest block mb-1">Keyingi mavzu</span>
                                <span className="font-bold text-slate-800 text-sm sm:text-[15px] truncate block">{sectionsData[activeSectionIndex + 1].title}</span>
                              </div>
                              <div className="w-12 h-12 rounded-2xl bg-blue-50 border border-blue-200 flex items-center justify-center text-blue-600 shrink-0 group-hover:bg-blue-100 group-hover:text-blue-700 transition-colors"><ChevronRight className="w-6 h-6"/></div>
                            </button>
                          ) : <div className="flex-1 hidden sm:block"></div>}
                        </div>
                      </div>
                      
                      {/* FLOATING COMPLETE BUTTON */}
                      <div className="fixed bottom-0 left-0 w-full bg-white/80 backdrop-blur-xl border-t border-slate-200 p-4 pb-6 z-40 shadow-[0_-10px_30px_rgba(0,0,0,0.05)]">
                         <button 
                           onClick={() => setActiveTab(null)}
                           className={`w-full max-w-2xl mx-auto block py-4 sm:py-5 rounded-2xl text-white font-black uppercase tracking-widest text-[13px] sm:text-sm shadow-xl bg-gradient-to-r ${activeSection.color} hover:opacity-90 active:scale-[0.98] transition-all border border-white/20`}
                         >
                           Tushunarli, Bosh menyuga qaytish
                         </button>
                      </div>
                    </div>
                  </motion.div>
                )}
              </AnimatePresence>
            </div>
          );
        }

        // Render to DOM
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
